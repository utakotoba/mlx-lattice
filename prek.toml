[[repos]]
repo = "builtin"
hooks = [
  { id = "check-added-large-files" },
  { id = "check-merge-conflict" },
  { id = "check-toml" },
  { id = "check-yaml" },
  { id = "end-of-file-fixer" },
  { id = "trailing-whitespace" },
]

[[repos]]
repo = "local"
hooks = [
  { id = "ruff-check", name = "ruff check", entry = "uv run ruff check --fix", language = "system", types_or = [
    "python",
    "pyi",
  ] },
  { id = "ruff-format", name = "ruff format", entry = "uv run ruff format", language = "system", types_or = [
    "python",
    "pyi",
  ] },
  { id = "ty-check", name = "ty check", entry = "uv run ty check", language = "system", pass_filenames = false },
  { id = "clang-format", name = "clang-format", entry = "clang-format -i", language = "system", files = '^native/.*\.(c|cc|cpp|cxx|h|hh|hpp|hxx|metal|cu)$' },
]
