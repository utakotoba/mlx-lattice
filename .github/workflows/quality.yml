name: Quality

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: sh

env:
  UV_FROZEN: "1"
  UV_LINK_MODE: copy
  UV_VERSION: "0.11.17"

jobs:
  mac-quality:
    name: macOS quality (Python ${{ matrix.python-version }})
    runs-on: macos-26

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up macOS environment
        uses: ./.github/actions/setup-macos
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff
        run: uv run --no-sync ruff check .

      - name: Ty
        run: uv run --no-sync ty check

      - name: Test
        run: uv run --no-sync pytest

  cuda-quality:
    name: Linux CUDA quality (Python 3.12)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Linux CUDA environment
        uses: ./.github/actions/setup-linux
        with:
          toolkit: cuda-13.2
          python-version: "3.12"
          ccache-key: mlx-lattice-cuda-quality

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Check CUDA compiler
        run: |
          nvcc --version
          echo "CUDA_PATH=${CUDA_PATH}"
          test -f "${CUDA_PATH}/targets/x86_64-linux/include/cublasLt.h"

      - name: Install build dependencies
        run: uv sync --group dev --group cuda-build --no-install-project

      - name: Build project
        run: |
          uv sync \
            --group dev \
            --group cuda-build \
            --no-build-isolation \
            --reinstall-package mlx-lattice \
            -Ccmake.define.CMAKE_CUDA_ARCHITECTURES=89 \
            -Ccmake.define.MLX_LATTICE_REQUIRE_CUDA=ON \
            -Ccmake.define.MLX_LATTICE_BUILD_CUDA=ON \
            -Ccmake.define.MLX_LATTICE_BUILD_METAL=OFF
