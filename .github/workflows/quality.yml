name: Quality

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_FROZEN: "1"
  UV_LINK_MODE: copy

jobs:
  mac-quality:
    name: macOS quality (Python ${{ matrix.python-version }})
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.17"
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff
        run: uv run --no-sync ruff check .

      - name: Ty
        run: uv run --no-sync ty check

      - name: Test
        run: uv run --no-sync pytest

  cuda-quality:
    name: Linux CUDA quality (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.17"
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up CUDA toolkit
        id: cuda-toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "13.2.0"
          method: network
          sub-packages: '["nvcc","cudart-dev","driver-dev"]'
          log-file-suffix: "ubuntu-latest.txt"

      - name: Check CUDA compiler
        run: |
          nvcc --version
          echo "CUDA_PATH=${CUDA_PATH}"

      - name: Install build dependencies
        run: |
          uv sync \
            --group dev \
            --no-install-project

      - name: Configure CUDA dependency paths
        run: |
          uv run --no-sync python - <<'PY' >> "${GITHUB_ENV}"
          import importlib.util
          import os
          import pathlib
          import sys

          packages = [
              "nvidia.cublas",
              "nvidia.cuda_nvrtc",
              "nvidia.cudnn",
              "nvidia.nccl",
          ]
          include_dirs = []
          lib_dirs = []

          for package in packages:
              spec = importlib.util.find_spec(package)
              if spec is None or spec.submodule_search_locations is None:
                  continue

              root = pathlib.Path(next(iter(spec.submodule_search_locations)))
              include = root / "include"
              lib = root / "lib"

              if include.is_dir():
                  include_dirs.append(str(include))
              if lib.is_dir():
                  lib_dirs.append(str(lib))

          if not any((pathlib.Path(path) / "cublasLt.h").exists() for path in include_dirs):
              print("Could not find cublasLt.h in CUDA dependency include dirs:", file=sys.stderr)
              for path in include_dirs:
                  print(f"  {path}", file=sys.stderr)
              raise SystemExit(1)

          print("CUDA dependency include dirs:", file=sys.stderr)
          for path in include_dirs:
              print(f"  {path}", file=sys.stderr)
          print("CUDA dependency library dirs:", file=sys.stderr)
          for path in lib_dirs:
              print(f"  {path}", file=sys.stderr)

          print(f"CUDA_DEP_INCLUDE_DIRS={';'.join(include_dirs)}")
          print(f"CUDA_DEP_LIBRARY_DIRS={';'.join(lib_dirs)}")
          ld_paths = [
              *lib_dirs,
              f"{os.environ['CUDA_PATH']}/lib64",
              f"{os.environ['CUDA_PATH']}/lib64/stubs",
              os.environ.get("LD_LIBRARY_PATH", ""),
          ]
          print(f"LD_LIBRARY_PATH={':'.join(path for path in ld_paths if path)}")
          PY

      - name: Build project
        run: |
          uv sync \
            --group dev \
            --reinstall-package mlx-lattice \
            -Ccmake.define.CMAKE_CUDA_ARCHITECTURES=80 \
            -Ccmake.define.MLX_LATTICE_CUDA_INCLUDE_DIRS="${CUDA_DEP_INCLUDE_DIRS}" \
            -Ccmake.define.MLX_LATTICE_CUDA_LIBRARY_DIRS="${CUDA_DEP_LIBRARY_DIRS}" \
            -Ccmake.define.MLX_LATTICE_REQUIRE_CUDA=ON \
            -Ccmake.define.MLX_LATTICE_BUILD_CUDA=ON \
            -Ccmake.define.MLX_LATTICE_BUILD_METAL=OFF

      - name: Configure runtime linker paths
        run: |
          mlx_package_dir="$(
            uv run --no-sync python -c "import importlib.util, pathlib, sys; spec = importlib.util.find_spec('mlx'); roots = list(spec.submodule_search_locations or []) if spec else []; print(pathlib.Path(roots[0]) if roots else ''); sys.exit(0 if roots else 1)"
          )"

          {
            echo "MLX_PACKAGE_DIR=${mlx_package_dir}"
            echo "LD_LIBRARY_PATH=${mlx_package_dir}/lib:${LD_LIBRARY_PATH:-}"
          } >> "${GITHUB_ENV}"

      - name: Check built backend flags
        run: |
          uv run --no-sync python - <<'PY'
          import mlx_lattice as lattice

          capabilities = lattice.capabilities()
          print("MLX Lattice capabilities:", capabilities)

          if not capabilities.get("cuda"):
              raise SystemExit("mlx-lattice was not built with CUDA support")
          PY

      - name: Test
        run: uv run --no-sync pytest
