name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: sh

env:
  UV_FROZEN: "1"
  UV_LINK_MODE: copy
  UV_VERSION: "0.11.17"

jobs:
  build-macos-26-wheels:
    name: macOS 26 wheels
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up macOS environment
        uses: ./.github/actions/setup-macos
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Check tag matches project version
        run: python scripts/check-release-version.py

      - name: Build wheels
        run: sh scripts/build-wheels.sh macos
        env:
          MACOSX_DEPLOYMENT_TARGET: "26.0"

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: pypi-wheel-macos-26
          path: dist/*.whl
          if-no-files-found: error
          compression-level: 0

  build-macos-15-wheels:
    name: macOS 15 wheels
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up macOS environment
        uses: ./.github/actions/setup-macos
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Check tag matches project version
        run: python scripts/check-release-version.py

      - name: Build wheels
        run: sh scripts/build-wheels.sh macos
        env:
          MACOSX_DEPLOYMENT_TARGET: "15.0"

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: pypi-wheel-macos-15
          path: dist/*.whl
          if-no-files-found: error
          compression-level: 0

  build-linux-cpu-wheels:
    name: Linux CPU wheels
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Linux CPU environment
        uses: ./.github/actions/setup-linux
        with:
          toolkit: cpu
          python-version: "3.12"
          ccache-key: mlx-lattice-linux-cpu-wheel

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Check tag matches project version
        run: python scripts/check-release-version.py

      - name: Build wheels
        run: sh scripts/build-wheels.sh linux-cpu

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: pypi-wheel-linux-cpu
          path: dist/*.whl
          if-no-files-found: error
          compression-level: 0

  build-linux-cuda-wheels:
    name: Linux CUDA 13 wheels
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Linux CUDA environment
        uses: ./.github/actions/setup-linux
        with:
          toolkit: cuda-13.2
          python-version: "3.12"
          ccache-key: mlx-lattice-linux-cuda13-wheel

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Check tag matches project version
        run: python scripts/check-release-version.py

      - name: Check CUDA compiler
        run: |
          nvcc --version
          echo "CUDA_PATH=${CUDA_PATH}"
          test -f "${CUDA_PATH}/targets/x86_64-linux/include/cublasLt.h"

      - name: Build wheels
        run: sh scripts/build-wheels.sh linux-cuda13

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: pypi-wheel-linux-cuda13
          path: dist/*.whl
          if-no-files-found: error
          compression-level: 0

  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Check tag matches project version
        run: python scripts/check-release-version.py

      - name: Build sdist
        run: uv build --sdist --out-dir dist

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: pypi-sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          compression-level: 0

  publish-cuda13:
    name: Publish CUDA 13 backend to PyPI
    runs-on: ubuntu-latest
    needs:
      [
        build-linux-cuda-wheels,
      ]
    environment:
      name: pypi-cuda13
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          pattern: pypi-wheel-linux-cuda13
          path: artifacts

      - name: Prepare distributions
        run: sh scripts/collect-distributions.sh 3

      - name: List distributions
        run: ls -lh dist

      - name: Check distribution archives
        run: sh scripts/verify-distributions.sh

      - name: Publish distributions
        run: sh scripts/publish-distributions.sh cuda13

  publish-main:
    name: Publish main package to PyPI
    runs-on: ubuntu-latest
    needs:
      [
        build-macos-26-wheels,
        build-macos-15-wheels,
        build-linux-cpu-wheels,
        build-sdist,
        publish-cuda13,
      ]
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Download macOS 26 wheels
        uses: actions/download-artifact@v8
        with:
          name: pypi-wheel-macos-26
          path: artifacts/pypi-wheel-macos-26

      - name: Download macOS 15 wheels
        uses: actions/download-artifact@v8
        with:
          name: pypi-wheel-macos-15
          path: artifacts/pypi-wheel-macos-15

      - name: Download Linux CPU wheels
        uses: actions/download-artifact@v8
        with:
          name: pypi-wheel-linux-cpu
          path: artifacts/pypi-wheel-linux-cpu

      - name: Download source distribution
        uses: actions/download-artifact@v8
        with:
          name: pypi-sdist
          path: artifacts/pypi-sdist

      - name: Prepare distributions
        run: sh scripts/collect-distributions.sh 10

      - name: List distributions
        run: ls -lh dist

      - name: Check distribution archives
        run: sh scripts/verify-distributions.sh

      - name: Publish distributions
        run: sh scripts/publish-distributions.sh main

  release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: [publish-cuda13, publish-main]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare distributions
        run: sh scripts/collect-distributions.sh 13

      - name: Create release notes
        run: npx --yes changelogithub@14 --contributors --emoji false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach distributions
        run: gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
