name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_FROZEN: 1
  UV_LINK_MODE: copy

jobs:
  quality:
    name: Python ${{ matrix.python-version }} Quick Check
    runs-on: macos-26

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.21
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --all-packages --group dev

      - name: Ruff
        run: uv run --no-sync ruff check .

      - name: Ty
        run: uv run --no-sync ty check

      - name: Test for CPU backend
        run: uv run --no-sync pytest --backend cpu

      - name: Test for Metal backend
        run: uv run --no-sync pytest --backend metal
