name: Setup Linux Environment
description: Install dependencies for Linux quality gates

inputs:
  toolkit:
    description: "Toolkit to install: cpu or cuda-13.2"
    required: false
    default: cpu
  python-version:
    description: Python version to set up
    required: false
    default: "3.12"
  use-ccache:
    description: Whether to enable ccache
    required: false
    default: "true"
  ccache-key:
    description: Cache key prefix for ccache
    required: false
    default: ccache

runs:
  using: composite
  steps:
    - name: Install common dependencies
      shell: sh
      run: |
        echo "::group::Install common dependencies"
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          ca-certificates \
          libfmt-dev \
          gdb \
          gnupg \
          ninja-build \
          wget \
          zip
        echo "::endgroup::"

    - name: Use ccache
      if: ${{ inputs.use-ccache == 'true' }}
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ inputs.ccache-key }}-${{ runner.os }}-${{ runner.arch }}-${{ inputs.toolkit }}
        max-size: 1GB
        update-package-index: false

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Set swap space
      if: ${{ startsWith(inputs.toolkit, 'cuda') }}
      uses: pierotofy/set-swap-space@fc79b3f67fa8a838184ce84a674ca12238d2c761
      with:
        swap-size-gb: 16

    - name: Install CUDA toolkit
      if: ${{ startsWith(inputs.toolkit, 'cuda') }}
      shell: sh
      run: |
        echo "::group::Install CUDA toolkit"
        case "${RUNNER_ARCH}" in
          ARM64) arch=sbsa ;;
          *) arch=x86_64 ;;
        esac

        case "${{ inputs.toolkit }}" in
          cuda-13.2)
            cuda_packages="libcudnn9-dev-cuda-13 cuda-compiler-13-2 cuda-libraries-dev-13-2"
            ;;
          *)
            echo "Unsupported CUDA toolkit: ${{ inputs.toolkit }}" >&2
            exit 1
            ;;
        esac

        wget "https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2204/${arch}/cuda-keyring_1.1-1_all.deb"
        sudo dpkg -i cuda-keyring_1.1-1_all.deb
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libnccl2 \
          libnccl-dev \
          ${cuda_packages}
        sudo ln -sf \
          "/usr/local/${{ inputs.toolkit }}/targets/x86_64-linux/lib/stubs/libcuda.so" \
          "/usr/local/${{ inputs.toolkit }}/targets/x86_64-linux/lib/stubs/libcuda.so.1"
        echo "/usr/local/${{ inputs.toolkit }}/bin" >> "${GITHUB_PATH}"
        echo "CUDA_PATH=/usr/local/${{ inputs.toolkit }}" >> "${GITHUB_ENV}"
        echo "LD_LIBRARY_PATH=/usr/local/${{ inputs.toolkit }}/targets/x86_64-linux/lib/stubs:/usr/local/${{ inputs.toolkit }}/lib64:${LD_LIBRARY_PATH:-}" >> "${GITHUB_ENV}"
        echo "::endgroup::"

    - name: CUDA packages and driver report
      if: ${{ startsWith(inputs.toolkit, 'cuda') }}
      shell: sh
      run: |
        echo "::group::Installed NVIDIA and CUDA packages"
        dpkg -l | grep -Ei "cuda|nvidia|cublas|cudnn|nccl" || true
        echo "::endgroup::"
        echo "::group::NVIDIA-SMI Status"
        nvidia-smi || true
        echo "::endgroup::"
