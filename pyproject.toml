[project]
name = "mlx-lattice"
version = "0.1.6"
description = "Sparse point cloud convolution library for MLX"
readme = "README.md"
requires-python = ">=3.12"
authors = [{ name = "Yu", email = "i@letter.cafe" }]
dependencies = ["mlx>=0.31"]

[build-system]
requires = ["scikit-build-core>=0.12", "nanobind>=2", "mlx>=0.31"]
build-backend = "scikit_build_core.build"

[dependency-groups]
dev = ["cmake>=3.27", "nanobind>=2", "ninja>=1.11", "pytest>=8", "ruff>=0.15.15", "ty>=0.0.40"]

[tool.scikit-build]
minimum-version = "0.12"
build-dir = "build/{wheel_tag}"
wheel.packages = ["src/mlx_lattice"]
wheel.platlib = true
sdist.include = [
  "CMakeLists.txt",
  "CMakePresets.json",
  "native/**",
  "src/**/*.py",
  "src/**/*.pyi",
  "src/**/py.typed",
]
sdist.exclude = [
  ".DS_Store",
  ".ruff_cache/**",
  "build/**",
  "dist/**",
  "references/**",
  "**/.DS_Store",
  "**/*.py[cod]",
  "**/__pycache__",
  "**/__pycache__/**",
  "src/**/__pycache__",
  "src/**/__pycache__/**",
  "tests/**/__pycache__",
  "tests/**/__pycache__/**",
]

[tool.scikit-build.editable]
rebuild = true

[tool.ruff]
line-length = 76
target-version = "py312"

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I", "B", "UP", "SIM", "RUF"]
fixable = ["ALL"]

[tool.ruff.format]
quote-style = "single"
indent-style = "space"
line-ending = "lf"

[tool.ty.rules]
unused-ignore-comment = "warn"
redundant-cast = "warn"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
